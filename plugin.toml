name = "recipe-lint"
version = "0.1.0"
description = "Tiered validation for Workato recipe JSON"
entrypoint = "./recipe-lint"

[hooks]
pre-push = "lint.pre_push"

[[commands]]
name = "lint"
description = "Lint Workato recipe JSON files"
method = "lint.run"

[[commands.args]]
name = "files"
description = "Recipe files to lint"
required = true

[[commands.flags]]
name = "skills-path"
description = "Path to connector skills directory"
type = "string"

[[commands.flags]]
name = "config-path"
description = "Path to lint configuration file"
type = "string"

[[commands.flags]]
name = "tiers"
description = "Lint tier levels to run"
type = "int-array"

[[commands.flags]]
name = "profile"
description = "Lint profile to use (overrides .wklintrc.json)"
type = "string"

[[commands.subcommands]]
name = "version"
description = "Show recipe-lint plugin version"
method = "lint.version"
