# Drop this into .github/workflows/ in both wk-cli-beta and wk-lint-beta.
# Set TOOL_NAME and TOOL_REPO to match each repo (see env block below).
# Required secret: TAP_GITHUB_TOKEN — a PAT with write access to homebrew-tap and scoop-bucket repos.

name: Update Homebrew & Scoop on release

on:
  workflow_run:
    workflows: ["release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update from (e.g. v1.0.0-beta)"
        required: true

env:
  # For wk-lint-beta:
  TOOL_NAME: recipe-lint
  TOOL_REPO: workato-devs/wk-lint-beta

jobs:
  update-package-managers:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        id: checksums
        run: |
          BASE="https://github.com/${{ env.TOOL_REPO }}/releases/download/${{ steps.release.outputs.tag }}"
          TOOL="${{ env.TOOL_NAME }}"
          VERSION="${{ steps.release.outputs.version }}"

          declare -A FILES=(
            [darwin_arm64]="${TOOL}_${VERSION}_Darwin_arm64.tar.gz"
            [darwin_amd64]="${TOOL}_${VERSION}_Darwin_x86_64.tar.gz"
            [linux_arm64]="${TOOL}_${VERSION}_Linux_arm64.tar.gz"
            [linux_amd64]="${TOOL}_${VERSION}_Linux_x86_64.tar.gz"
            [windows_amd64]="${TOOL}_${VERSION}_Windows_x86_64.zip"
            [windows_arm64]="${TOOL}_${VERSION}_Windows_arm64.zip"
          )

          for key in "${!FILES[@]}"; do
            file="${FILES[$key]}"
            curl -sL -o "$file" "$BASE/$file"
            sha=$(sha256sum "$file" | cut -d' ' -f1)
            echo "${key}_sha=$sha" >> "$GITHUB_OUTPUT"
          done

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/workato-devs/homebrew-tap.git"
          cd homebrew-tap

          FORMULA="Formula/${{ env.TOOL_NAME }}.rb"
          VERSION="${{ steps.release.outputs.version }}"

          sed -i "s/version \".*\"/version \"$VERSION\"/" "$FORMULA"

          update_sha() {
            local marker="$1" sha="$2"
            # Find the platform/arch block and update the sha256 on the next occurrence
            python3 -c "
          import re, sys
          with open('$FORMULA') as f: content = f.read()
          parts = content.split('$marker', 1)
          if len(parts) == 2:
              before_sha = parts[1].split('sha256', 1)
              if len(before_sha) == 2:
                  rest = before_sha[1].split('\n', 1)
                  parts[1] = before_sha[0] + 'sha256 \"$sha\"' + '\n' + rest[1] if len(rest) == 2 else before_sha[0] + 'sha256 \"$sha\"'
                  content = '$marker'.join(parts)
          with open('$FORMULA', 'w') as f: f.write(content)
          "
          }

          update_sha 'Darwin_arm64' "${{ steps.checksums.outputs.darwin_arm64_sha }}"
          update_sha 'Darwin_x86_64' "${{ steps.checksums.outputs.darwin_amd64_sha }}"
          update_sha 'Linux_arm64' "${{ steps.checksums.outputs.linux_arm64_sha }}"
          update_sha 'Linux_x86_64' "${{ steps.checksums.outputs.linux_amd64_sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git diff --cached --quiet && echo "No Homebrew changes" || { git commit -m "Update ${{ env.TOOL_NAME }} to $VERSION" && git push; }

      - name: Update Scoop manifest
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/workato-devs/scoop-bucket.git"
          cd scoop-bucket

          MANIFEST="bucket/${{ env.TOOL_NAME }}.json"
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          TOOL="${{ env.TOOL_NAME }}"
          REPO="${{ env.TOOL_REPO }}"

          python3 -c "
          import json
          with open('$MANIFEST') as f: m = json.load(f)
          m['version'] = '$VERSION'
          m['architecture']['64bit']['url'] = 'https://github.com/$REPO/releases/download/$TAG/${TOOL}_${VERSION}_Windows_x86_64.zip'
          m['architecture']['64bit']['hash'] = '${{ steps.checksums.outputs.windows_amd64_sha }}'
          m['architecture']['arm64']['url'] = 'https://github.com/$REPO/releases/download/$TAG/${TOOL}_${VERSION}_Windows_arm64.zip'
          m['architecture']['arm64']['hash'] = '${{ steps.checksums.outputs.windows_arm64_sha }}'
          with open('$MANIFEST', 'w') as f: json.dump(m, f, indent=2)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"
          git diff --cached --quiet && echo "No Scoop changes" || { git commit -m "Update ${{ env.TOOL_NAME }} to $VERSION" && git push; }
